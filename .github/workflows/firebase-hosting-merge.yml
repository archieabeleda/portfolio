name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main

# These two lines are required for keyless login. Without id-token: write,
# GitHub cannot mint the token, and auth fails.
permissions:
  contents: read
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: archieabeleda-web
          # paste the line from Part 7 here:
          workload_identity_provider: projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          # paste your service account email here:
          service_account: github-action-1290210391@archieabeleda-web.iam.gserviceaccount.com

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project archieabeleda-web
